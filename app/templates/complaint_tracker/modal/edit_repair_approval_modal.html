<div class="modal is-active animate__animated" id="repair-approval-modal">
    <div class="modal-background"></div>
    <div class="modal-card">
        <header class="modal-card-head">
            <p class="modal-card-title" align="center">Add Repair Approval</p>
            <button type="button" id="cancelRepairApprovalButton" class="delete" aria-label="close"></button>
        </header>
        <section class="modal-card-body">
            <form hx-post="{{ url_for('comp_tracker.edit_repair_approval', repair_approval_id=repair_approval_id) }}">
                <input type="hidden" value="{{ csrf_token() }}" name="csrf_token">
                <div class="field-body" style="margin-bottom: .8em; margin-top: .8em">
                    <div class="field">
                        <label class="label">
                            รหัสศูนย์ต้นทุน
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            {{ form.cost_center(class='js-example-basic-single') }}
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">
                            รหัสใบสั่งงานภายใน
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            {{ form.io_code(class='js-example-basic-single') }}
                        </div>
                    </div>
                    <div class="field">
                        <label class="label">
                            ผลผลิต
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            {{ form.product_code(class='js-example-basic-single') }}
                        </div>
                    </div>
                </div>
                <div class="field ">
                    <div class="control">
                        <input type="submit" id="submit-form" class="button is-success" value="บันทึก">
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>
<script>
    window.document.getElementById("cancelRepairApprovalButton").addEventListener("click", function () {
        htmx.addClass(htmx.find('#repair-approval-modal'), 'animate__fadeOut')
        htmx.removeClass(htmx.find('#repair-approval-modal'), "is-active", 500)
    })
    $(document).ready(()=> {
        $('.js-example-basic-single').select2({
            width: '100%'
        });
    });
</script>

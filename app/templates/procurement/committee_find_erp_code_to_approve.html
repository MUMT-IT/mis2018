{% extends "base.html" %}
{% block page_content %}
    <section class="section">
        {% include "messages.html" %}
        <nav class="breadcrumb" aria-label="breadcrumbs">
            <ul>
                <li>
                    <a href="{{ url_for('procurement.committee_first') }}">
                    <span class="icon is-small">
                      <i class="fas fa-home" aria-hidden="true"></i>
                    </span>
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('procurement.qrcode_scan') }}">
                    <span class="icon is-small">
                      <i class="fas fa-qrcode" aria-hidden="true"></i>
                    </span>
                        <span>Scan QR Code</span>
                    </a>
                </li>
                <li class="is-active">
                    <a href="#">
                    <span class="icon is-small">
                      <i class="fas fa-search" aria-hidden="true"></i>
                    </span>
                        <span>Search</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="columns">
                <div class="column has-text-centered">
                    <h4 class="title is-4">ค้นหา Inventory Number/ ERP</h4>
                </div>
            </div>
        <div class="container">
            <div class="columns">
                <div class="column">
                    <table id="data" class="table is-striped">
                        <thead>
                        <th>ตรวจสอบ</th>
                        <th>Inventory Number/ERP</th>

                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <a href="{{ url_for('procurement.committee_first') }}" class="button is-rounded is-info is-light">
                    <span class="icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                        <span>กลับ</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script>
        $(document).ready(function () {
            var table = $('#data').DataTable({
                serverSide: true,
                searchDelay: 1000,
                ajax: '{{ url_for("procurement.get_procurement_search_data") }}',

                language: {
                    emptyTable: "กรุณาพิมพ์ ERP Code อย่างน้อย 4 ตัว"
                },

                columns: [
                    {data: 'check'},
                    {data: 'erp_code'}
                ]
            });

            $('#data_filter input').unbind();

            $('#data_filter input').on('keyup', function () {
                var value = this.value;
                if (value.length >= 4 || value.length === 0) {
                    table.search(value).draw();
                }
            });
        });
    </script>
{% endblock %}

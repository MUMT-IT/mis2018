{% extends "base.html" %}
{% include "procurement/nav.html" %}
{% block page_content %}
    <section class="section">
        <style>
            .thumbnail-wrapper {
                position: relative;
                display: inline-block;
                width: 56px;
                height: 56px;
            }
            .thumbnail-loader {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.85);
            }
            .thumbnail-loader::after {
                content: "";
                width: 16px;
                height: 16px;
                border: 2px solid #d9d9d9;
                border-top-color: #3273dc;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            .thumbnail-loader.is-hidden {
                display: none;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        {% include "messages.html" %}
        <div class="container">
            <div class="columns">
                <div class="column has-text-left">
                    <h1 class="title">ข้อมูลครุภัณฑ์ทั้งหมด</h1>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <table id="data" class="table is-fullwidth is-striped">
                        <thead>
                        <th>Image</th>
                        <th>View</th>
                        <th>Edit</th>
                        <th>รายการ</th>
                        <th>รหัสครุภัณฑ์</th>
                        <th>Inventory Number/ERP</th>
                        <th>ปีงบประมาณ</th>
                        <th>วันที่ได้รับ</th>
                        <th>สถานะ</th>

                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <a href="{{ url_for('procurement.landing') }}" class="button is-rounded is-info is-light">
                    <span class="icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                        <span>กลับ</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script>
        $(document).ready(function () {
            const bindThumbnailLoaders = function () {
                document.querySelectorAll('.thumbnail-wrapper').forEach(function (wrapper) {
                    const img = wrapper.querySelector('.thumbnail-image');
                    const loader = wrapper.querySelector('.thumbnail-loader');
                    if (!img || !loader) {
                        return;
                    }
                    const hideLoader = function () {
                        loader.classList.add('is-hidden');
                    };
                    if (img.complete) {
                        hideLoader();
                    } else {
                        img.addEventListener('load', hideLoader, {once: true});
                        img.addEventListener('error', hideLoader, {once: true});
                    }
                });
            };

            var table = $('#data').DataTable({
            serverSide: true,
            searchDelay: 1000,
            ajax: '{{ url_for("procurement.get_procurement_data") }}',

            columns: [
                {data: 'thumbnail', orderable: false, searchable: false},
                {data: 'view', orderable: false, searchable: false},
                {data: 'edit', orderable: false, searchable: false},
                {data: 'name'},
                {data: 'procurement_no'},
                {data: 'erp_code'},
                {data: 'budget_year'},
                {data: 'received_date'},
                {data: 'available'}
            ]
            });

            table.on('draw', bindThumbnailLoaders);
        });
    </script>
{% endblock %}

{% extends "base.html" %}
{% include "procurement/nav.html" %}
{% block page_content %}
    <section class="section">
        {% include "messages.html" %}
        <div class="container">
            <div class="columns">
                <div class="column has-text-left">
                    <h1 class="title">ข้อมูลครุภัณฑ์ทั้งหมด</h1>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <table id="data" class="table is-fullwidth is-striped">
                        <thead>
                        <th>View</th>
                        <th>Edit</th>
                        <th>รายการ</th>
                        <th>รหัสครุภัณฑ์</th>
                        <th>Inventory Number/ERP</th>
                        <th>ปีงบประมาณ</th>
                        <th>วันที่ได้รับ</th>
                        <th>สถานะ</th>

                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <a href="{{ url_for('procurement.landing') }}" class="button is-rounded is-info is-light">
                    <span class="icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                        <span>กลับ</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script>
        $(document).ready(function () {

            var table = $('#data').DataTable({
            serverSide: true,
            searchDelay: 1000,
            ajax: '{{ url_for("procurement.get_procurement_data") }}',

            language: {
                emptyTable: "กรุณาพิมพ์คำค้นหาอย่างน้อย 4 ตัวอักษร"
            },

            columns: [
                {data: 'view', orderable: false, searchable: false},
                {data: 'edit', orderable: false, searchable: false},
                {data: 'name'},
                {data: 'procurement_no'},
                {data: 'erp_code'},
                {data: 'budget_year'},
                {data: 'received_date'},
                {data: 'available'}
            ]
            });

            $('#data_filter input').unbind();

            $('#data_filter input').on('keyup', function () {
                var value = this.value;
                if (value.length >= 4 || value.length === 0) {
                    table.search(value).draw();
                }
            });
        });
    </script>
{% endblock %}

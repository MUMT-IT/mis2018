{% extends "base.html" %}
{% block page_content %}
    <section class="section">
        <style>
            .thumbnail-wrapper {
                position: relative;
                display: inline-block;
                width: 56px;
                height: 56px;
            }
            .thumbnail-loader {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.85);
            }
            .thumbnail-loader::after {
                content: "";
                width: 16px;
                height: 16px;
                border: 2px solid #d9d9d9;
                border-top-color: #3273dc;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            .thumbnail-loader.is-hidden {
                display: none;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        {% include "messages.html" %}
        <nav class="breadcrumb" aria-label="breadcrumbs">
            <ul>
                <li>
                    <a href="{{ url_for('procurement.first_page') }}">
                    <span class="icon is-small">
                      <i class="fas fa-home" aria-hidden="true"></i>
                    </span>
                        <span>Home</span>
                    </a>
                </li>
                <li class="is-active">
                    <a href="#">
                    <span class="icon is-small">
                      <i class="fas fa-search" aria-hidden="true"></i>
                    </span>
                        <span>Search Info</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="columns">
                <div class="column has-text-centered">
                    <h1 class="title">All Procurement Information</h1>
                    <h2 class="subtitle">ค้นหาโดยชื่อรายการ, รหัสครุภัณฑ์, รหัส ERP</h2>
                </div>
            </div>
        <div class="container">
            <div class="columns">
                <div class="column is-one-third">
                    <label class="label">แสดงรายการ</label>
                    <div class="select is-fullwidth">
                        <select id="instrumentFilter">
                            <option value="1" selected>เฉพาะครุภัณฑ์เครื่องมือ (is_instruments=true)</option>
                            <option value="0">ทั้งหมด</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <table id="data" class="table is-striped" style="width:100%">
                        <thead>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Inventory Number/ERP</th>
                        <th>รายละเอียด</th>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <a href="{{ url_for('procurement.first_page') }}" class="button is-rounded is-info is-light">
                    <span class="icon">
                        <i class="fas fa-arrow-left"></i>
                    </span>
                        <span>กลับ</span>
                    </a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script>
        $(document).ready(function () {
            const bindThumbnailLoaders = function () {
                document.querySelectorAll('.thumbnail-wrapper').forEach(function (wrapper) {
                    const img = wrapper.querySelector('.thumbnail-image');
                    const loader = wrapper.querySelector('.thumbnail-loader');
                    if (!img || !loader) {
                        return;
                    }
                    const hideLoader = function () {
                        loader.classList.add('is-hidden');
                    };
                    if (img.complete) {
                        hideLoader();
                    } else {
                        img.addEventListener('load', hideLoader, {once: true});
                        img.addEventListener('error', hideLoader, {once: true});
                    }
                });
            };

            const table = $('#data').DataTable({
                searchDelay: 350,
                ajax: {
                    url: '{{ url_for("procurement.get_procurement_to_check_instruments") }}',
                    data: function (d) {
                        d.only_instruments = $('#instrumentFilter').val();
                    }
                },
                serverSide: true,
                columns: [
                    {data: 'thumbnail', orderable: false, searchable: false},
                    {data: 'name'},
                    {data: 'erp_code'},
                    {data: 'add'}

                ],
            });
            table.on('draw', bindThumbnailLoaders);
            $('#instrumentFilter').on('change', function () {
                table.ajax.reload();
            });
        });
    </script>
{% endblock %}

<style>
    .main-nav-logo {
        max-height: 44px;
        width: auto;
        object-fit: contain;
    }
</style>
<nav class="navbar">
    <div class="container">
        <div class="navbar-brand">
            <a href="{{ url_for('procurement.main_procurement_page') }}" class="navbar-item">
                <img class="main-nav-logo" src="{{ url_for('static', filename='img/logo-MU_Color.png') }}" alt="Logo">
            </a>
            <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMenuMain">

                <span></span>
            </a>

                <a class="navbar-item" href="{{ url_for('procurement.main_procurement_page') }}">

                </a>

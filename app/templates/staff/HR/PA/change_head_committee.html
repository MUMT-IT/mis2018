<div class="modal is-active animate__animated" id="pa-change-committee-form-container">
    <div class="modal-background"></div>
    <div class="modal-card">
        <header class="modal-card-head">
            <p class="modal-card-title">เปลี่ยนประธานกรรมการ</p>
            <button type="button" id="cancelButton" class="delete" aria-label="close"></button>
        </header>
        {% include "messages.html" %}
        <section class="modal-card-body">
            <form hx-post="{{ url_for('pa.pa_change_head_committee', round_id=round_id, pa_id=pa_id) }}"
                  hx-swap="none"
                  hx-indicator="#save-btn">
                {{ form.hidden_tag() }}

                <div class="field">
                    <label class="label">{{ form.head_committee_staff_account.label }}</label>
                    <div>
                        {{ form.head_committee_staff_account(style="width:100%") }}
                    </div>
                </div>
                <div class="field has-text-centered">
                    <button class="button is-success is-outlined" type="submit" id="save-btn">
                        <span class="icon">
                            <i class="fa-solid fa-paper-plane"></i>
                        </span>
                        <span>บันทึก</span>
                    </button>
                </div>
            </form>
        </section>
    </div>
</div>
<script>
    document.getElementById("cancelButton").addEventListener("click", function () {
        htmx.removeClass(htmx.find('#pa-change-committee-form-container'), 'is-active')
    })
    document.addEventListener('closeModal', () => {
        htmx.removeClass(htmx.find('#pa-change-committee-form-container'), 'is-active')
    })

    ;(function () {
        const cssUrl = 'https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css'
        const jsUrl = 'https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js'
        const jsId = 'select2-js'

        if (!document.querySelector(`link[href="${cssUrl}"]`)) {
            const link = document.createElement('link')
            link.rel = 'stylesheet'
            link.href = cssUrl
            document.head.appendChild(link)
        }

        function initHeadCommitteeSelect() {
            const $field = $('#head_committee_staff_account')
            if (!$field.length || $field.hasClass('select2-hidden-accessible')) {
                return
            }
            $field.select2({
                width: '100%',
                dropdownParent: $('#pa-change-committee-form-container'),
                placeholder: 'ค้นหาชื่อประธานกรรมการ',
                allowClear: true
            })
        }

        if (window.jQuery && $.fn.select2) {
            initHeadCommitteeSelect()
            return
        }

        let script = document.getElementById(jsId)
        if (!script) {
            script = document.createElement('script')
            script.id = jsId
            script.src = jsUrl
            document.body.appendChild(script)
        }
        script.addEventListener('load', initHeadCommitteeSelect, {once: true})
    })()
</script>

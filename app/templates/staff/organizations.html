{% extends "base.html" %}
{% include "staff/nav.html" %}

{% block page_content %}
    <section class="section">
        <h1 class="title">แก้ไขข้อมูลหน่วยงาน</h1>
        <div class="columns">
            <div class="column is-one-third is-offset-4">
                <nav class="panel is-warning">
                    <p class="panel-heading">Menu</p>
                    {% for org in orgs %}
                    <div class="panel-block is-block">
                        <div class="is-flex is-align-items-center is-justify-content-space-between">
                            <a href="{{ url_for('staff.list_org_staff', org_id=org.id) }}">
                                <span class="is-size-5">
                                    {{ org.display_name }}
                                    <span class="tag is-light is-link">{{ org.active_staff|length }}</span>
                                </span>
                            </a>
                            <span class="tag {% if org.is_external %}is-warning{% else %}is-light{% endif %}">
                                {% if org.is_external %}external{% else %}internal{% endif %}
                            </span>
                        </div>
                        <form method="post" class="mt-2">
                            <input type="hidden" name="org_id" value="{{ org.id }}">
                            <label class="checkbox">
                                <input type="checkbox" name="is_external" {% if org.is_external %}checked{% endif %}>
                                หน่วยงานภายนอก
                            </label>
                            <button type="submit" class="button is-small is-info is-light ml-2">บันทึก</button>
                        </form>
                    </div>
                    {% endfor %}
                </nav>
            </div>
        </div>
    </section>
{% endblock %}

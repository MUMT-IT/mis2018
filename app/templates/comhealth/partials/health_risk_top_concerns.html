<section class="mb-5 section-shell" id="top-concerns-section">
    <div class="mb-3">
        <h2 class="title is-4 mb-3">{{ ui.top_concerns }}</h2>
        <div class="summary-grid">
            {% for issue in top_issues %}
                <div class="summary-card">
                    <div class="is-flex is-justify-content-space-between is-align-items-start" style="gap: 1rem;">
                        <div>
                            <p class="title is-6 mb-1 is-flex is-align-items-center">
                                <span class="icon risk-icon {{ issue.concern_badge_class }}"><i class="fa-solid fa-triangle-exclamation"></i></span>
                                <span>{{ issue.issue_name }}</span>
                            </p>
                            <p class="is-size-7 has-text-grey">{{ ui.concern_score }}: {{ issue.concern_score }}</p>
                        </div>
                        <span class="badge {{ issue.concern_badge_class }}">{{ issue.concern_level }}</span>
                    </div>
                    <p class="mt-3 is-size-7 has-text-grey">{{ issue.short_explanation }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
</section>

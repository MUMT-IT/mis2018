{% extends "comhealth/tests.html" %}
{% block subpage_content %}
    <div class="hero-foot">
        <nav class="tabs is-boxed">
            <div class="container">
                <ul>
                    <li><a href="/comhealth/tests">Profile</a></li>
                    <li><a href="/comhealth/test/groups">Group</a></li>
                    <li class="is-active"><a href="/comhealth/test/tests">Test</a></li>
                </ul>
            </div>
        </nav>
    </div>
    </section>
    <section class="section" id="app">
        <div class="container">
            <div class="columns">
                <div class="column">
                    <div class="has-text-left">
                        <strong>Total Test</strong>&nbsp;<span class="tag is-success">
                        <% tests.length %>
                    </span>
                    </div>
                </div>
                <div class="column">
                    <div class="has-text-right">
                        <a class="button is-link"
                            href="{{ url_for('comhealth.add_new_test') }}">
                            <span class="icon">
                                <i class="fas fa-plus"></i>
                            </span>
                            <span>เพิ่มรายการทดสอบ</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="columns">
                <div class="column">
                    <div class="columns">
                        <div class="column">
                            <b-field label="Search Name">
                                <b-input v-model="queryName" placeholder="Type name..."></b-input>
                            </b-field>
                        </div>
                        <div class="column">
                            <b-field label="Search Description">
                                <b-input v-model="queryDesc" placeholder="Type description..."></b-input>
                            </b-field>
                        </div>
                    </div>
                    <b-table :data="filteredTests" :paginated="true" :per-page="10" default-sort="name">
                        <template slot-scope="props">
                            <b-table-column field="name" label="Name" sortable>
                                <% props.row.name %>
                            </b-table-column>
                            <b-table-column field="desc" label="Description" sortable>
                                <% props.row.desc %>
                            </b-table-column>
                            <b-table-column field="default_price" label="Default Price"
                                sortable numeric centered>
                                <% props.row.default_price %>
                            </b-table-column>
                            <b-table-column field="" label="Edit" sortable>
                                <a class="button is-rounded is-light"
                                v-bind:href="'/comhealth/test/tests/edit/' + props.row.id">
                                    <span class="icon">
                                        <i class="fas fa-pencil-alt"></i>
                                    </span><span>Edit</span>
                                </a>
                            </b-table-column>
                        </template>
                    </b-table>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script type="text/javascript">
        var vm = new Vue({
            el: "#app",
            delimiters: ['<%', '%>'],
            data() {
                return {
                    tests: {{ tests|tojson|safe }},
                    queryName: '',
                    queryDesc: '',
                }
            },
            computed: {
                filteredTests() {
                    var nameQuery = this.queryName.trim().toLowerCase();
                    var descQuery = this.queryDesc.trim().toLowerCase();
                    return this.tests.filter(function (test) {
                        var nameValue = (test.name || '').toString().toLowerCase();
                        var descValue = (test.desc || '').toString().toLowerCase();
                        var nameMatch = nameQuery === '' || nameValue.indexOf(nameQuery) !== -1;
                        var descMatch = descQuery === '' || descValue.indexOf(descQuery) !== -1;
                        return nameMatch && descMatch;
                    });
                }
            }
        });
    </script>
{% endblock %}

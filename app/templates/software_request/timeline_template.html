<tr>
    <td>{{ timeline.task }}</td>
    <td>{{ timeline.issue.issue }}</td>
    <td>
        <span class="tag {{ timeline.status_color }} is-light">
            {{ timeline.status }}
        </span>
    </td>
    <td>{{ timeline.start.strftime('%d/%m/%Y') }}</td>
    <td>{{ timeline.estimate.strftime('%d/%m/%Y') }}</td>
    <td>{{ timeline.admin.fullname }}</td>
    <td>
        <div class="field has-addons">
            <div class="control">
                <a class="button is-small is-rounded"
                   hx-swap="innerHTML"
                   hx-target="#timeline_form"
                   hx-get="{{ url_for('software_request.create_timeline', timeline_id=timeline.id, tab=tab,
                           template=template) }}"
                >
                    <span class="icon">
                        <i class="fas fa-pencil-alt"></i>
                    </span>
                </a>
            </div>
            <div class="control">
                <a class="button is-small is-rounded"
                   hx-delete="{{ url_for('software_request.delete_timeline', timeline_id=timeline.id) }}"
                   hx-confirm="ท่านต้องการลบรายการนี้หรือไม่"
                >
                    <span class="icon">
                        <i class="far fa-trash-alt has-text-danger"></i>
                    </span>
                </a>
            </div>
        </div>
    </td>
</tr>

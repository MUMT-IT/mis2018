<div class="modal is-active animate__animated" id="test-result-modal">
    <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title" align="center">
                    {% if detail_id %}
                        เพิ่มผลการทดสอบ
                    {% else %}
                        แก้ไขผลการทดสอบ
                    {% endif %}
                </p>
                <button type="button" id="cancelTestResultButton" class="delete" aria-label="close"></button>
            </header>
            <section class="modal-card-body">
                <form
                    {% if detail_id %}
                        hx-post="{{ url_for('software_request.create_test_result', detail_id=detail_id) }}"
                    {% else %}
                        hx-post="{{ url_for('software_request.create_test_result', test_result_id=test_result_id) }}"
                    {% endif %}
                    hx-target="#test_results"
                    hx-swap="beforeend"
                >
                <input type="hidden" value="{{ csrf_token() }}" name="csrf_token">
                    <div class="field">
                        <label class="label">
                            Requirement
                            <span class="has-text-danger">*</span>
                        </label>
                    </div>
                    <div class="field">
                        <div class="control">
                            {{ form.issue(class='js-example-basic-single') }}
                        </div>
                    </div>
                    <div class="field mt-2">
                        <div class="control">
                            <input type="submit" id="submit-form" class="button is-success" value="บันทึก">
                        </div>
                    </div>
                </form>
            </section>
        </div>
</div>
<script>
    window.document.getElementById("cancelTestResultButton").addEventListener("click", function() {
        htmx.addClass(htmx.find('#test-result-modal'), 'animate__fadeOut')
        htmx.removeClass(htmx.find('#test-result-modal'), "is-active", 500)
    })
    $(document).ready(() => {
        $('.js-example-basic-single').select2({
            width: '100%',
        });
    });
</script>

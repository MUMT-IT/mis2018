<div class="modal is-active animate__animated" id="unapprove-final-result-modal">
    <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title" align="center">
                    เหตุผลที่ไม่อนุมัติคำขอแก้ไขใบรายงานผล
                </p>
                <button type="button" id="cancelButton" class="delete" aria-label="close"></button>
            </header>
            <section class="modal-card-body">
                <form hx-post="{{ url_for('service_admin.unapprove_final_result_reversion', result_item_id=result_item_id,
                menu=menu, tab=tab) }}"
                >
                <input type="hidden" value="{{ csrf_token() }}" name="csrf_token">
                    <div class="field">
                        <label class="label">
                            รายละเอียด
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            <textarea name="remark" id="remark" class="textarea" required></textarea>
                        </div>
                    </div>
                    <div class="field ">
                        <div class="buttons is-centered">
                            <a href="{{ url_for('service_admin.result_index', menu=menu, tab=tab) }}"
                               class="button"
                            >
                                ยกเลิก
                            </a>
                            <input type="submit" id="submit-form" class="button is-success" value="บันทึก">
                        </div>
                    </div>
                </form>
            </section>
        </div>
</div>
<script>
    window.document.getElementById("cancelButton").addEventListener("click", function() {
        htmx.addClass(htmx.find('#unapprove-final-result-modal'), 'animate__fadeOut')
        htmx.removeClass(htmx.find('#unapprove-final-result-modal'), "is-active", 500)
    })
</script>
